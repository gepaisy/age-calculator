<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة العمر التعليمية | سالم الفاهمي</title>
    <style>
        :root {
            --primary-gold: #d4af37;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator-card {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { color: var(--primary-gold); margin-bottom: 0.5rem; font-size: 1.5rem; }
        p.subtitle { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            text-align: center;
            font-size: 1rem;
        }

        input:focus { border-color: var(--primary-gold); outline: none; }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #af891a, #d4af37);
            color: #121212;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.02); }

        #result {
            margin-top: 2rem;
            padding: 15px;
            border-radius: 10px;
            background-color: #252525;
            display: none;
            border-right: 4px solid var(--primary-gold);
        }

        footer { margin-top: 2rem; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>

<div class="calculator-card">
    <h1>حاسبة الأهلية الدراسية</h1>
    <p class="subtitle">إعداد: سالم الفاهمي (أبو محمد)</p>
    
    <div class="input-group">
        <input type="number" id="day" placeholder="يوم" min="1" max="31">
        <input type="number" id="month" placeholder="شهر" min="1" max="12">
        <input type="number" id="year" placeholder="سنة (هجري)" min="1430" max="1450">
    </div>

    <button onclick="calculateEligibility()">تحليل الأهلية</button>

    <div id="result">
        <div id="ageText" style="margin-bottom: 10px; font-weight: bold;"></div>
        <div id="gradeText" style="color: var(--primary-gold);"></div>
    </div>

    <footer>حقوق التصميم محفوظة © 2026</footer>
</div>

<script>
    function calculateEligibility() {
        const year = document.getElementById('year').value;
        const resultDiv = document.getElementById('result');
        const ageText = document.getElementById('ageText');
        const gradeText = document.getElementById('gradeText');

        if(!year) { alert("لطفاً أدخل سنة الميلاد"); return; }

        // حساب تقريبي بناءً على معايير عام 1448هـ
        // ملاحظة: الحسابات هنا مبنية على سنة الميلاد الهجرية
        const targetYear = 1448;
        const age = targetYear - year;

        resultDiv.style.display = "block";
        ageText.innerText = "العمر التقريبي في 1448هـ: " + age + " سنوات";

        if (age >= 6) {
            gradeText.innerText = "النتيجة: مستحق للالتحاق بالصف الأول الابتدائي";
        } else if (age >= 5) {
            gradeText.innerText = "النتيجة: مستحق للالتحاق بمرحلة الروضة / تمهيدي";
        } else {
            gradeText.innerText = "النتيجة: السن دون سن القبول الرسمي حالياً";
        }
    }
</script>

</body>
</html>
