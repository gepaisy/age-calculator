<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة أعمار الطلاب المستجدين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #e3f2fd;
            --secondary-green: #e8f5e9;
            --accent-blue: #1976d2;
            --accent-green: #2e7d32;
            --text-main: #37474f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-green));
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 { color: var(--accent-blue); font-size: 1.8rem; margin-bottom: 25px; }
        h1 i { margin-left: 10px; }

        .section {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }

        h2 { font-size: 1.1rem; color: var(--accent-green); margin-top: 0; }
        
        .input-row {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            text-align: center;
            font-size: 1rem;
        }

        input:focus { border-color: var(--accent-blue); outline: none; }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: var(--accent-blue);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button.btn-green { background-color: var(--accent-green); }
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            background: #f9f9f9;
            display: none;
            font-weight: bold;
            border-right: 5px solid var(--accent-blue);
        }

        .dept-info {
            margin-top: 30px;
            font-weight: bold;
            color: var(--accent-blue);
            font-size: 0.9rem;
        }

        footer {
            margin-top: 10px;
            font-size: 0.75rem;
            color: #999;
        }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-user-graduate"></i> حاسبة أعمار الطلاب المستجدين</h1>

    <div class="section">
        <h2><i class="fas fa-calendar-alt"></i> محول التاريخ الهجري إلى ميلادي</h2>
        <div class="input-row">
            <input type="number" id="hDay" placeholder="يوم">
            <input type="number" id="hMonth" placeholder="شهر">
            <input type="number" id="hYear" placeholder="سنة هجرية">
        </div>
        <button onclick="convertToGregorian()"><i class="fas fa-exchange-alt"></i> تحويل إلى ميلادي</button>
        <div id="convResult" class="result-box"></div>
    </div>

    <div class="section">
        <h2><i class="fas fa-calculator"></i> حساب العمر والصف المستحق (1448هـ)</h2>
        <div class="input-row">
            <input type="number" id="birthYear" placeholder="سنة الميلاد الهجرية">
        </div>
        <button class="btn-green" onclick="checkEligibility()"><i class="fas fa-search-plus"></i> تحليل الأهلية</button>
        <div id="ageResult" class="result-box" style="border-right-color: var(--accent-green);"></div>
    </div>

    <div class="dept-info">إعداد / قسم قياس الأداء المؤسسي</div>
    <footer>حقوق التصميم محفوظة © 2026</footer>
</div>

<script>
    // دالة تحويل التاريخ الهجري (تقريبية برمجياً)
    function convertToGregorian() {
        const hYear = document.getElementById('hYear').value;
        const res = document.getElementById('convResult');
        if(!hYear) return;
        
        // معادلة تقريبية للتحويل
        const gYear = Math.round(hYear * 0.97 + 622);
        res.style.display = "block";
        res.innerHTML = `<i class="fas fa-calendar-check"></i> التاريخ الميلادي التقريبي: ${gYear} م`;
    }

    // دالة حساب الأهلية الدراسية
    function checkEligibility() {
        const year = document.getElementById('birthYear').value;
        const res = document.getElementById('ageResult');
        if(!year) return;

        const targetYear = 1448;
        const age = targetYear - year;
        
        res.style.display = "block";
        let message = "";
        
        if (age >= 6) {
            message = "الصف المستحق: الأول الابتدائي";
        } else if (age >= 5) {
            message = "المرحلة المستحقة: روضة / تمهيدي";
        } else {
            message = "السن دون القبول الرسمي حالياً";
        }
        
        res.innerHTML = `العمر في 1448هـ: ${age} سنوات <br> ${message}`;
    }
</script>

</body>
</html>
