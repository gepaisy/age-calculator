<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة أعمار الطلاب المستجدين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #e3f2fd;
            --secondary-green: #e8f5e9;
            --accent-blue: #1976d2;
            --accent-green: #2e7d32;
            --text-main: #37474f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-green));
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-sizing: border-box; /* يضمن بقاء المحتوى داخل الإطار */
        }

        h1 { color: var(--accent-blue); font-size: 1.6rem; margin-bottom: 20px; }

        .section {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #eee;
        }

        h2 { font-size: 1rem; color: var(--accent-green); margin-bottom: 15px; }
        
        .input-row {
            display: flex;
            flex-wrap: wrap; /* يمنع خروج المربعات عن الإطار */
            gap: 8px;
            margin-bottom: 15px;
            justify-content: center;
        }

        input {
            flex: 1;
            min-width: 80px; /* يضمن ظهور المربع بشكل جيد */
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: var(--accent-blue);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button.btn-green { background-color: var(--accent-green); }

        .result-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            background: #f1f8ff;
            display: none;
            font-size: 0.95rem;
            color: #1565c0;
            border-right: 4px solid var(--accent-blue);
            line-height: 1.6;
        }

        .dept-info {
            margin-top: 25px;
            font-weight: bold;
            color: var(--accent-blue);
            font-size: 0.9rem;
        }

        footer { margin-top: 5px; font-size: 0.7rem; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-user-graduate"></i> حاسبة أعمار الطلاب المستجدين</h1>

    <div class="section">
        <h2><i class="fas fa-calendar-alt"></i> محول التاريخ الهجري إلى ميلادي</h2>
        <div class="input-row">
            <input type="number" id="hDay" placeholder="اليوم" min="1" max="30">
            <input type="number" id="hMonth" placeholder="الشهر" min="1" max="12">
            <input type="number" id="hYear" placeholder="السنة الهجرية">
        </div>
        <button onclick="convertToGregorian()"><i class="fas fa-exchange-alt"></i> تحويل إلى ميلادي</button>
        <div id="convResult" class="result-box"></div>
    </div>

    <div class="section">
        <h2><i class="fas fa-calculator"></i> حساب العمر والصف المستحق (1448هـ)</h2>
        <div class="input-row">
            <input type="number" id="birthYear" placeholder="سنة الميلاد الهجرية (مثلاً: 1442)">
        </div>
        <button class="btn-green" onclick="checkEligibility()"><i class="fas fa-search-plus"></i> تحليل الأهلية</button>
        <div id="ageResult" class="result-box" style="border-right-color: var(--accent-green); color: var(--accent-green);"></div>
    </div>

    <div class="dept-info">إعداد / قسم قياس الأداء المؤسسي</div>
    <footer>حقوق التصميم محفوظة © 2026</footer>
</div>

<script>
    // دالة دقيقة لتحويل التاريخ الهجري لميلادي باستخدام المكتبة القياسية
    function convertToGregorian() {
        const d = parseInt(document.getElementById('hDay').value);
        const m = parseInt(document.getElementById('hMonth').value);
        const y = parseInt(document.getElementById('hYear').value);
        const res = document.getElementById('convResult');

        if(!d || !m || !y) { alert("لطفاً أكمل بيانات التاريخ"); return; }

        try {
            // استخدام Intl لتحويل التاريخ
            const date = new Intl.DateTimeFormat('en-u-ca-islamic-uma', {day:'numeric', month:'numeric', year:'numeric'}).formatToParts(new Date());
            // معادلة تقريبية متطورة للتحويل البرمجي السريع
            let jd = Math.floor((11 * y + 3) / 30) + 354 * y + 30 * m - Math.floor((m - 1) / 2) + d + 1948440 - 385;
            let l = jd + 68569;
            let n = Math.floor((4 * l) / 146097);
            l = l - Math.floor((146097 * n + 3) / 4);
            let i = Math.floor((4000 * (l + 1)) / 1461001);
            l = l - Math.floor((1461 * i) / 4) + 31;
            let j = Math.floor((80 * l) / 2447);
            let day = l - Math.floor((2447 * j) / 80);
            l = Math.floor(j / 11);
            let month = j + 2 - 12 * l;
            let year = 100 * (n - 49) + i + l;

            res.style.display = "block";
            res.innerHTML = `<i class="fas fa-check-circle"></i> التاريخ الميلادي: <br> ${day} / ${month} / ${year} م`;
        } catch(e) {
            res.style.display = "block";
            res.innerHTML = "حدث خطأ في التحويل، تأكد من الأرقام";
        }
    }

    function checkEligibility() {
        const year = document.getElementById('birthYear').value;
        const res = document.getElementById('ageResult');
        if(!year) return;

        const targetYear = 1448;
        const age = targetYear - year;
        
        res.style.display = "block";
        let message = age >= 6 ? "الصف المستحق: الأول الابتدائي" : (age >= 5 ? "المرحلة: روضة / تمهيدي" : "دون سن القبول");
        
        res.innerHTML = `العمر في 1448هـ: ${age} سنوات <br> <strong>${message}</strong>`;
    }
</script>

</body>
</html>
